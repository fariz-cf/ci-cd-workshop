name: Level 2 - Koopa's Fortress

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      # TODO - Configureer JDK 21 - hint: wellicht ook iets met actions?
      - name: Configure JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      # TODO - Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # TODO - Run een gradle test command
      - name: Run Gradle test
        run: ./gradlew test --configuration-cache

      # TODO - Upload een test rapport met het resultaat van de gedraaide testen
      - name: Upload gradle test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test